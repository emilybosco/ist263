<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 12</title>
    <script>
        function change () {
            document.getElementById("arrow").setAttribute("src", "https://peopel-su.github.io/ist263/images/arrow_over.png")
        }
          function changeBack () {
            document.getElementById("arrow").setAttribute("src", "https://peopel-su.github.io/ist263/images/arrow.png")
        }
        function wrongAnswer () {
            document.getElementById("wrong").innerHTML = "Wrong Answer!"
        }
    </script>
</head>
<body>
    <h1>Image Rollovers</h1>
    <img id="arrow" src="https://peopel-su.github.io/ist263/images/arrow.png" alt="arrow icon" onmouseover="change()" onmouseout="changeBack()">

<h1>My JavaScript Quiz</h1>
    <p></p>Java and JavaScript are the same thing.</p>
    <p onclick="wrongAnswer();" id="wrong">True</p>
    <p onclick="rightAnswer()" id="correct">False</p>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale+1.0">
        <title>First JavaScript Program</title>
        <style>
            h1 {
            cursor: pointer;
        }
        </style>
        <script>
            function SecondBlock() {
                alert ('Second Alert');
            }
            function hovery() {
                alert ("I'm hovering over this text");
            }
            function clicky() {
                alert ("I clicked on a single word.");
            }
        </script>
        </head>

    <body>
        <script>alert('I am sending an alert!');</script>
        <h1 onclick="SecondBlock()">Classic First JavaScript Program</h1>
        <p onmouseover="hovery()">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        <p>Ut enim ad minim veniam, quis nostrud <a href="#" onclick="clicky()">exercitation</a> ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
    </body>
    
</html>
